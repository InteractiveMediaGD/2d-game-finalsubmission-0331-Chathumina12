<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FURY - Dialogue System</title>
    <!-- Sci-fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CSS VARIABLES (Theme Configuration)
           ========================================= */
        :root {
            /* Core Backgrounds for Demo */
            --bg-color: #050505;
            
            /* NEON FURY Core Colors */
            --primary-color: #00f2ff; /* Neon Cyan */
            --secondary-color: #ff00ff; /* Neon Magenta */
            --text-color: #ffffff;
            --prompt-color: #ccff00; /* Neon Yellow for "Next" */
            
            /* UI Elements */
            --dialogue-bg: rgba(5, 5, 5, 0.75);
            --dialogue-border: rgba(0, 242, 255, 0.4);
            
            /* Animation Speeds */
            --type-speed: 30ms; /* JS typing speed */
            --transition-speed: 0.3s;
        }

        /* =========================================
           2. BASE SETUP & BACKGROUND
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            /* Subtle dark grid to simulate a game environment background */
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Align dialogue to bottom */
            padding-bottom: 5vh;
        }

        /* Scanline Overlay for the whole screen */
        .global-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
        }

        /* =========================================
           3. DIALOGUE BOX LAYOUT
           ========================================= */
        .dialogue-wrapper {
            width: 90%;
            max-width: 1000px;
            height: 28vh; /* Roughly 25-30% of screen height */
            min-height: 200px;
            background: var(--dialogue-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--dialogue-border);
            box-shadow: 
                0 0 30px rgba(0, 242, 255, 0.1), 
                inset 0 0 20px rgba(0, 0, 0, 0.8);
            
            /* Military Sci-Fi cut corners */
            clip-path: polygon(
                40px 0, 100% 0, 100% calc(100% - 40px), 
                calc(100% - 40px) 100%, 0 100%, 0 40px
            );
            
            position: relative;
            z-index: 100;
            display: flex;
            padding: 2px; /* For the inner glow border effect */
            cursor: pointer; /* Indicates it can be clicked to advance */
        }

        /* Inner subtle flickering background lines */
        .dialogue-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 4px,
                rgba(0, 242, 255, 0.03) 4px,
                rgba(0, 242, 255, 0.03) 8px
            );
            animation: bgFlicker 4s infinite alternate;
            pointer-events: none;
            z-index: -1;
        }

        .dialogue-inner {
            flex: 1;
            display: flex;
            background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
            clip-path: polygon(
                38px 0, 100% 0, 100% calc(100% - 38px), 
                calc(100% - 38px) 100%, 0 100%, 0 38px
            );
            padding: 25px;
            gap: 30px;
        }

        /* =========================================
           4. PORTRAIT / AVATAR (Abstract)
           ========================================= */
        .portrait-container {
            flex-shrink: 0;
            width: 160px;
            height: 160px;
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid var(--dialogue-border);
            /* Sharper angled cuts for portrait */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* Portrait decorative tech lines */
        .portrait-container::after {
            content: 'SYS.LINK';
            position: absolute;
            bottom: 5px;
            left: 10px;
            font-size: 0.6rem;
            color: var(--dialogue-border);
            letter-spacing: 2px;
            opacity: 0.7;
        }

        /* Abstract Animated Waveform (No Faces allowed) */
        .abstract-waveform {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 60%;
        }

        .wave-bar {
            width: 12px;
            height: 100%;
            background-color: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
            transform-origin: center;
            animation: voiceWave 1.2s ease-in-out infinite alternate;
            /* Angular tips for bars */
            clip-path: polygon(50% 0%, 100% 10%, 100% 90%, 50% 100%, 0% 90%, 0% 10%);
        }

        /* Staggered animation for realistic voice wave */
        .wave-bar:nth-child(1) { animation-delay: 0.0s; height: 40%; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; height: 80%; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; height: 100%; }
        .wave-bar:nth-child(4) { animation-delay: 0.1s; height: 70%; }
        .wave-bar:nth-child(5) { animation-delay: 0.3s; height: 50%; }

        /* =========================================
           5. TEXT AREA & TYPOGRAPHY
           ========================================= */
        .text-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .character-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            margin-bottom: 15px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            align-self: flex-start;
        }

        /* Name Glitch Effect */
        .character-name::before,
        .character-name::after {
            content: attr(data-name);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
            pointer-events: none;
        }

        .character-name::before {
            left: 2px; text-shadow: -1px 0 var(--secondary-color);
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        .character-name::after {
            left: -2px; text-shadow: -1px 0 rgba(255,255,255,0.5);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            animation: glitch-anim-2 2s infinite linear alternate-reverse;
        }

        .dialogue-text {
            font-size: 1.35rem;
            line-height: 1.6;
            color: var(--text-color);
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.4);
            flex: 1;
            padding-right: 40px; /* Room for next prompt */
            overflow-y: auto;
            white-space: pre-wrap;
            font-variant-ligatures: none;
        }

        /* Custom scrollbar for dialogue if text is long */
        .dialogue-text::-webkit-scrollbar { width: 4px; }
        .dialogue-text::-webkit-scrollbar-track { background: transparent; }
        .dialogue-text::-webkit-scrollbar-thumb { background: var(--primary-color); }

        /* The pulsing Next indicator */
        .next-prompt {
            position: absolute;
            bottom: 0;
            right: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--prompt-color);
            text-shadow: 0 0 10px var(--prompt-color);
            animation: pulseNext 1s ease-in-out infinite;
            opacity: 0; /* Hidden while typing */
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .next-prompt.visible {
            opacity: 1;
        }

        /* =========================================
           6. ANIMATIONS
           ========================================= */
        @keyframes voiceWave {
            0% { transform: scaleY(0.3); opacity: 0.5; }
            100% { transform: scaleY(1); opacity: 1; filter: brightness(1.5); }
        }

        @keyframes bgFlicker {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.9; }
        }

        @keyframes pulseNext {
            0% { transform: translateX(0); opacity: 0.5; }
            50% { transform: translateX(5px); opacity: 1; filter: drop-shadow(0 0 15px var(--prompt-color)); }
            100% { transform: translateX(0); opacity: 0.5; }
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); transform: translate(-2px, 1px); }
            20% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); transform: translate(2px, -1px); }
            40% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); transform: translate(-2px, 2px); }
            60% { clip-path: polygon(0 15%, 100% 15%, 100% 25%, 0 25%); transform: translate(2px, -2px); }
            80% { clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%); transform: translate(-1px, 1px); }
            100% { clip-path: polygon(0 85%, 100% 85%, 100% 95%, 0 95%); transform: translate(1px, -1px); }
        }
        
        @keyframes glitch-anim-2 {
            0% { clip-path: polygon(0 25%, 100% 25%, 100% 35%, 0 35%); transform: translate(2px, -1px); }
            20% { clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); transform: translate(-2px, 1px); }
            40% { clip-path: polygon(0 5%, 100% 5%, 100% 15%, 0 15%); transform: translate(2px, 2px); }
            60% { clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); transform: translate(-2px, -2px); }
            80% { clip-path: polygon(0 75%, 100% 75%, 100% 85%, 0 85%); transform: translate(1px, 1px); }
            100% { clip-path: polygon(0 35%, 100% 35%, 100% 45%, 0 45%); transform: translate(-1px, -1px); }
        }

        /* Responsive Layout Updates */
        @media (max-width: 768px) {
            .dialogue-wrapper { height: auto; min-height: 250px; }
            .dialogue-inner { flex-direction: column; padding: 15px; gap: 15px; }
            .portrait-container { width: 80px; height: 80px; align-self: flex-start; }
            .character-name { font-size: 1.4rem; }
            .dialogue-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- CRT Global Scanlines -->
    <div class="global-scanlines"></div>

    <!-- Dialogue System Overlay -->
    <div class="dialogue-wrapper" id="dialogue-box">
        <div class="dialogue-inner">
            
            <!-- Abstract Portrait (No Faces) -->
            <div class="portrait-container" id="portrait">
                <div class="abstract-waveform" id="waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>

            <!-- Text Content -->
            <div class="text-container">
                <div class="character-name" id="char-name" data-name="SYSTEM">SYSTEM</div>
                <div class="dialogue-text" id="dialogue-text"></div>
                
                <!-- Pulsing Next Prompt -->
                <div class="next-prompt" id="next-prompt">>></div>
            </div>
            
        </div>
    </div>

    <!-- Demonstration Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Script Data: Array of dialogue lines to cycle through
            const dialogueSequence = [
                {
                    name: "AI-OVERLORD",
                    text: "Scanning organic lifeform... Unauthorized biological signature detected in Sector 4.",
                    color: "var(--primary-color)"
                },
                {
                    name: "REBEL_CMD",
                    text: "Don't listen to it! Override the mainframe before the automated turrets lock onto your position. We only have one shot at this.",
                    color: "var(--secondary-color)"
                },
                {
                    name: "AI-OVERLORD",
                    text: "Purge protocol initiated. Have a pleasant cycle.",
                    color: "var(--primary-color)"
                }
            ];

            // DOM Elements
            const boxElement = document.getElementById('dialogue-box');
            const nameElement = document.getElementById('char-name');
            const textElement = document.getElementById('dialogue-text');
            const promptElement = document.getElementById('next-prompt');
            const waveformBars = document.querySelectorAll('.wave-bar');
            
            // State Variables
            let currentLineIndex = 0;
            let isTyping = false;
            let typeInterval = null;
            let currentFullText = "";

            // Start the sequence
            playDialogue(currentLineIndex);

            // Click listener on the dialogue box
            boxElement.addEventListener('click', () => {
                if (isTyping) {
                    // Skip typing effect and show full text immediately
                    completeText();
                } else {
                    // Advance to next line
                    currentLineIndex++;
                    if (currentLineIndex >= dialogueSequence.length) {
                        currentLineIndex = 0; // Loop for demo purposes
                    }
                    playDialogue(currentLineIndex);
                }
            });

            function playDialogue(index) {
                const lineData = dialogueSequence[index];
                
                // Set Name, Glitch attribute, and Theme Color
                nameElement.innerText = lineData.name;
                nameElement.setAttribute('data-name', lineData.name);
                nameElement.style.color = lineData.color;
                nameElement.style.textShadow = `0 0 10px ${lineData.color}`;
                
                // Update Waveform colors to match speaker
                waveformBars.forEach(bar => {
                    bar.style.backgroundColor = lineData.color;
                    bar.style.boxShadow = `0 0 10px ${lineData.color}`;
                    // Randomize animation play state to feel "active"
                    bar.style.animationPlayState = 'running';
                });

                // Reset Text and Prompt
                textElement.textContent = "";
                promptElement.classList.remove('visible');
                currentFullText = lineData.text;
                
                // Start Typing
                startTypingEffect(currentFullText);
            }

            function startTypingEffect(text) {
                isTyping = true;
                let charIndex = 0;
                clearInterval(typeInterval);
                
                // Simple audio beep simulation could go here

                typeInterval = setInterval(() => {
                    if (charIndex < text.length) {
                        textElement.textContent += text.charAt(charIndex);
                        charIndex++;
                    } else {
                        completeText();
                    }
                }, 30); // 30ms per character
            }

            function completeText() {
                clearInterval(typeInterval);
                textElement.textContent = currentFullText;
                isTyping = false;
                promptElement.classList.add('visible'); // Show ">>"
                
                // Pause waveform animation when done speaking
                waveformBars.forEach(bar => {
                    bar.style.animationPlayState = 'paused';
                });
            }
        });
    </script>
</body>
</html>
