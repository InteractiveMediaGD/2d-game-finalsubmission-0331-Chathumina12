<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FURY - Settings Menu</title>
    <!-- Sci-fi Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CSS VARIABLES (Theme Configuration)
           ========================================= */
        :root {
            /* Core Backgrounds for Demo */
            --bg-color: #050505;
            
            /* NEON FURY Core Colors */
            --primary-color: #00f2ff; /* Neon Cyan */
            --secondary-color: #ff00ff; /* Neon Magenta */
            --text-color: #ffffff;
            
            /* UI Elements */
            --modal-bg: rgba(5, 5, 5, 0.85);
            --panel-bg: rgba(255, 255, 255, 0.03);
            
            /* Animation Speeds */
            --transition-speed: 0.3s;
        }

        /* =========================================
           2. BASE SETUP & BACKGROUND
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Global Scanline Overlay */
        .global-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
        }

        /* =========================================
           3. SETTINGS MODAL LAYOUT
           ========================================= */
        .settings-modal {
            width: 90%;
            max-width: 1000px;
            height: 80vh;
            max-height: 700px;
            background: var(--modal-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 
                0 0 40px rgba(0, 242, 255, 0.15), 
                inset 0 0 30px rgba(0, 0, 0, 0.9);
            
            /* Military Sci-Fi cut corners */
            clip-path: polygon(
                40px 0, 100% 0, 100% calc(100% - 40px), 
                calc(100% - 40px) 100%, 0 100%, 0 40px
            );
            
            position: relative;
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        /* Modal Top Deco Bar */
        .settings-modal::before {
            content: '';
            position: absolute;
            top: 0; left: 40px; width: 200px; height: 4px;
            background: var(--primary-color);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .settings-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color);
            margin-bottom: 30px;
            text-transform: uppercase;
            text-align: center;
            position: relative;
        }

        /* Content Area (Split into two columns) */
        .settings-content {
            display: flex;
            flex: 1;
            gap: 40px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        .settings-content::-webkit-scrollbar { width: 6px; }
        .settings-content::-webkit-scrollbar-track { background: rgba(0, 242, 255, 0.05); }
        .settings-content::-webkit-scrollbar-thumb { background: var(--primary-color); }

        .settings-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            background: var(--panel-bg);
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
        }

        .section-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--secondary-color);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--secondary-color);
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        /* =========================================
           4. CUSTOM UI ELEMENTS (Sliders & Checkboxes)
           ========================================= */
        
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setting-label-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.85);
        }

        .setting-value {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-color);
            font-size: 1rem;
            font-weight: 700;
        }

        /* --- Custom Neon Range Sliders --- */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            outline: none;
        }

        /* WebKit Track */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.5);
            box-shadow: inset 0 0 5px rgba(0, 242, 255, 0.3);
        }

        /* WebKit Thumb (Magenta) */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 14px;
            background: var(--secondary-color);
            box-shadow: 0 0 15px var(--secondary-color), 0 0 30px var(--secondary-color);
            cursor: pointer;
            margin-top: -10px; /* Centers thumb on track */
            /* Angular sci-fi cut */
            clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
            transition: transform 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            filter: brightness(1.3);
        }

        /* Mozilla Track */
        input[type="range"]::-moz-range-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(0, 242, 255, 0.15);
            border: 1px solid rgba(0, 242, 255, 0.5);
        }

        /* Mozilla Thumb */
        input[type="range"]::-moz-range-thumb {
            height: 24px;
            width: 14px;
            background: var(--secondary-color);
            border: none;
            box-shadow: 0 0 15px var(--secondary-color), 0 0 30px var(--secondary-color);
            cursor: pointer;
            clip-path: polygon(0 20%, 100% 0, 100% 80%, 0 100%);
        }

        /* --- Custom Cyber Checkboxes --- */
        .cyber-checkbox-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.85);
            user-select: none;
        }

        .hidden-cb {
            display: none;
        }

        .custom-cb {
            width: 28px;
            height: 28px;
            background: rgba(0, 242, 255, 0.05);
            border: 2px solid rgba(0, 242, 255, 0.4);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
        }

        /* Checked State */
        .hidden-cb:checked + .custom-cb {
            border-color: var(--secondary-color);
            background: rgba(255, 0, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5), inset 0 0 10px rgba(255, 0, 255, 0.3);
        }

        /* Glowing X Mark inside checked box */
        .hidden-cb:checked + .custom-cb::after {
            content: 'X';
            color: var(--secondary-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            text-shadow: 0 0 8px var(--secondary-color);
        }

        /* Click / Active Animation */
        .cyber-checkbox-label:active .custom-cb {
            transform: scale(0.85);
        }

        /* =========================================
           5. ACTION BUTTONS (Bottom Area)
           ========================================= */
        .settings-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cyber-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 12px 30px;
            cursor: pointer;
            outline: none;
            transition: all var(--transition-speed) ease;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
            position: relative;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid transparent;
            background: linear-gradient(45deg, var(--primary-color), transparent) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            pointer-events: none;
        }

        .cyber-btn:hover, .cyber-btn:focus {
            background: rgba(255, 0, 255, 0.15);
            color: var(--text-color);
            border-color: var(--secondary-color);
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.6),
                inset 0 0 15px rgba(255, 0, 255, 0.3);
            animation: flicker 0.15s ease-in-out infinite alternate;
        }

        .cyber-btn:hover::before {
            background: linear-gradient(45deg, var(--secondary-color), transparent) border-box;
        }

        .cyber-btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: rgba(0, 242, 255, 0.2);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        /* =========================================
           6. ANIMATIONS & RESPONSIVE
           ========================================= */
        @keyframes flicker {
            0% { opacity: 0.9; text-shadow: 0 0 5px var(--secondary-color); }
            50% { opacity: 1; text-shadow: 0 0 15px var(--secondary-color), 0 0 30px var(--secondary-color); }
            100% { opacity: 0.8; text-shadow: none; }
        }

        @media (max-width: 800px) {
            .settings-content { flex-direction: column; }
            .settings-actions { flex-direction: column; }
            .cyber-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="global-scanlines"></div>

    <div class="settings-modal">
        <h1 class="settings-title">SYSTEM CFG</h1>
        
        <div class="settings-content">
            
            <!-- Audio Settings Panel -->
            <div class="settings-section">
                <div class="section-header">AUDIO_MATRIX</div>
                
                <div class="setting-row">
                    <div class="setting-label-box">
                        <label>Master Volume</label>
                        <span class="setting-value" id="val-master">85%</span>
                    </div>
                    <input type="range" class="neon-slider" min="0" max="100" value="85" data-target="val-master">
                </div>

                <div class="setting-row">
                    <div class="setting-label-box">
                        <label>SFX Output</label>
                        <span class="setting-value" id="val-sfx">100%</span>
                    </div>
                    <input type="range" class="neon-slider" min="0" max="100" value="100" data-target="val-sfx">
                </div>

                <div class="setting-row">
                    <div class="setting-label-box">
                        <label>Synthwave BGM</label>
                        <span class="setting-value" id="val-bgm">60%</span>
                    </div>
                    <input type="range" class="neon-slider" min="0" max="100" value="60" data-target="val-bgm">
                </div>
            </div>

            <!-- Graphics & Gameplay Panel -->
            <div class="settings-section">
                <div class="section-header">VISUAL_&_SYS</div>
                
                <div class="setting-row">
                    <div class="setting-label-box">
                        <label>FOV (Field of View)</label>
                        <span class="setting-value" id="val-fov">90%</span>
                    </div>
                    <!-- Technically FOV isn't %, but mapped 0-100 for consistency in UI demo -->
                    <input type="range" class="neon-slider" min="0" max="100" value="90" data-target="val-fov">
                </div>

                <br> <!-- Spacing before checkboxes -->

                <div class="setting-row">
                    <label class="cyber-checkbox-label">
                        <span>Chromatic Aberration</span>
                        <input type="checkbox" class="hidden-cb" checked>
                        <span class="custom-cb"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <label class="cyber-checkbox-label">
                        <span>HUD Glitch Effects</span>
                        <input type="checkbox" class="hidden-cb" checked>
                        <span class="custom-cb"></span>
                    </label>
                </div>

                <div class="setting-row">
                    <label class="cyber-checkbox-label">
                        <span>V-Sync Override</span>
                        <input type="checkbox" class="hidden-cb">
                        <span class="custom-cb"></span>
                    </label>
                </div>
            </div>

        </div>

        <div class="settings-actions">
            <button class="cyber-btn">QUIT SYS</button>
            <button class="cyber-btn">BACK TO GAME</button>
            <button class="cyber-btn btn-primary">APPLY CHANGES</button>
        </div>
    </div>

    <!-- Demonstration Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup real-time value updating for Neon Sliders
            const sliders = document.querySelectorAll('.neon-slider');
            
            sliders.forEach(slider => {
                slider.addEventListener('input', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    const valueDisplay = document.getElementById(targetId);
                    
                    if(valueDisplay) {
                        valueDisplay.textContent = `${e.target.value}%`;
                    }
                });
            });
        });
    </script>
</body>
</html>
