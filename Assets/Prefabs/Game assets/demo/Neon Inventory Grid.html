<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON FURY - Inventory System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. CSS VARIABLES (Theme Configuration)
           ========================================= */
        :root {
            /* Core Backgrounds */
            --bg-color: #050505;
            --modal-bg: rgba(5, 5, 5, 0.75);
            
            /* NEON FURY Core Colors */
            --primary-color: #00f2ff; /* Neon Cyan */
            --secondary-color: #ff00ff; /* Neon Magenta */
            --text-color: #ffffff;
            
            /* Rarity Colors */
            --rarity-common: #a0a0a0; /* Dim White/Grey */
            --rarity-rare: #00f2ff;   /* Cyan */
            --rarity-legendary: #ffaa00; /* Gold/Orange */
            
            /* UI Elements */
            --slot-bg: rgba(255, 255, 255, 0.03);
            --slot-border: rgba(255, 255, 255, 0.15);
            
            /* Animation Speeds */
            --transition-speed: 0.25s;
        }

        /* =========================================
           2. BASE SETUP & BACKGROUND
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-color);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Scanline Overlay for the whole screen */
        .global-scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 999;
        }

        /* =========================================
           3. INVENTORY MODAL LAYOUT
           ========================================= */
        .inventory-modal {
            display: flex;
            width: 900px;
            height: 600px;
            background: var(--modal-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1), inset 0 0 20px rgba(0, 0, 0, 0.8);
            
            /* Military Sci-Fi cut corners */
            clip-path: polygon(
                30px 0, 100% 0, 100% calc(100% - 30px), 
                calc(100% - 30px) 100%, 0 100%, 0 30px
            );
            position: relative;
            z-index: 10;
        }

        /* Deco accents on modal */
        .inventory-modal::before {
            content: '';
            position: absolute;
            top: 0; left: 30px; width: 150px; height: 3px;
            background: var(--primary-color);
            box-shadow: 0 0 10px var(--primary-color);
        }

        /* =========================================
           4. LEFT PANE: GRID SYSTEM
           ========================================= */
        .grid-section {
            flex: 2;
            padding: 40px;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .section-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .capacity-tracker {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            flex-grow: 1;
        }

        /* --- Individual Slots --- */
        .item-slot {
            position: relative;
            background: var(--slot-bg);
            border: 1px solid var(--slot-border);
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Angled corners for slots */
            clip-path: polygon(
                10px 0, 100% 0, 100% calc(100% - 10px), 
                calc(100% - 10px) 100%, 0 100%, 0 10px
            );
        }

        /* Slot Scanlines Overlay */
        .item-slot::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.2) 2px,
                rgba(0, 0, 0, 0.2) 4px
            );
            pointer-events: none;
            z-index: 2;
        }

        /* Slot ID Number */
        .slot-id {
            position: absolute;
            top: 4px;
            left: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            z-index: 3;
            pointer-events: none;
        }

        /* Icon Container */
        .item-icon {
            width: 60%;
            height: 60%;
            z-index: 1;
            transition: transform var(--transition-speed) cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem; /* If using emoji/text as placeholder */
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        /* --- Slot Interaction & States --- */
        .item-slot:hover {
            border-color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        .item-slot:hover .item-icon {
            transform: scale(1.15);
        }

        .item-slot.active {
            border-color: var(--secondary-color);
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4), inset 0 0 15px rgba(255, 0, 255, 0.2);
        }

        /* --- Rarity System --- */
        .common {
            border-color: rgba(160, 160, 160, 0.5);
            background: radial-gradient(circle, rgba(160, 160, 160, 0.1) 0%, transparent 70%);
        }
        .common:hover { box-shadow: 0 0 10px rgba(160,160,160,0.5); }

        .rare {
            border-color: rgba(0, 242, 255, 0.6);
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
        }
        .rare:hover { box-shadow: 0 0 15px rgba(0,242,255,0.6); }

        .legendary {
            border-color: rgba(255, 170, 0, 0.8);
            background: radial-gradient(circle, rgba(255, 170, 0, 0.2) 0%, transparent 70%);
        }
        .legendary:hover { box-shadow: 0 0 20px rgba(255,170,0,0.8); }


        /* =========================================
           5. RIGHT PANE: ITEM DETAILS SIDEBAR
           ========================================= */
        .sidebar-section {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.03));
            position: relative;
        }

        /* Detailed Icon Display */
        .detail-icon-box {
            width: 100%;
            height: 200px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .detail-icon-box .item-icon {
            font-size: 5rem;
            width: auto; height: auto;
        }

        /* Details Text */
        .item-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            position: relative;
        }

        .item-rarity-badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%);
        }

        .item-desc {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
            margin-bottom: auto; /* Pushes button to bottom */
            border-left: 2px solid var(--primary-color);
            padding-left: 15px;
        }

        /* Item Stats List */
        .item-stats {
            list-style: none;
            margin-top: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--primary-color);
        }
        .item-stats li { margin-bottom: 5px; }
        .item-stats span { color: #fff; margin-left: 10px; }

        /* Use Item Button */
        .use-btn {
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 15px;
            cursor: pointer;
            outline: none;
            clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px));
            transition: all var(--transition-speed) ease;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.2);
            margin-top: 20px;
            position: relative;
        }

        .use-btn:hover:not(:disabled) {
            background: rgba(255, 0, 255, 0.1);
            color: var(--text-color);
            border-color: var(--secondary-color);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6), inset 0 0 20px rgba(255, 0, 255, 0.4);
            animation: flicker 0.15s ease-in-out infinite alternate;
        }

        .use-btn:disabled {
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Empty State */
        .empty-sidebar {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-align: center;
        }

        /* =========================================
           6. GLITCH & FLICKER ANIMATIONS
           ========================================= */
        @keyframes flicker {
            0% { opacity: 0.9; text-shadow: 0 0 5px var(--secondary-color); }
            50% { opacity: 1; text-shadow: 0 0 15px var(--secondary-color); }
            100% { opacity: 0.8; text-shadow: none; }
        }

        .glitch-text { position: relative; }
        .glitch-text::before, .glitch-text::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch-text::before {
            left: 2px; text-shadow: -1px 0 var(--secondary-color);
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }
        .glitch-text::after {
            left: -2px; text-shadow: -1px 0 var(--primary-color);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            animation: glitch-anim-2 1.6s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); transform: translate(-2px, 1px); }
            20% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); transform: translate(2px, -1px); }
            40% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); transform: translate(-2px, 2px); }
            60% { clip-path: polygon(0 15%, 100% 15%, 100% 25%, 0 25%); transform: translate(2px, -2px); }
            80% { clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%); transform: translate(-1px, 1px); }
            100% { clip-path: polygon(0 85%, 100% 85%, 100% 95%, 0 95%); transform: translate(1px, -1px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: polygon(0 25%, 100% 25%, 100% 35%, 0 35%); transform: translate(2px, -1px); }
            20% { clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); transform: translate(-2px, 1px); }
            40% { clip-path: polygon(0 5%, 100% 5%, 100% 15%, 0 15%); transform: translate(2px, 2px); }
            60% { clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); transform: translate(-2px, -2px); }
            80% { clip-path: polygon(0 75%, 100% 75%, 100% 85%, 0 85%); transform: translate(1px, 1px); }
            100% { clip-path: polygon(0 35%, 100% 35%, 100% 45%, 0 45%); transform: translate(-1px, -1px); }
        }

        /* Responsive behavior */
        @media (max-width: 950px) {
            .inventory-modal { flex-direction: column; width: 95%; height: auto; max-height: 95vh; overflow-y: auto; }
            .sidebar-section { border-top: 1px solid rgba(255,255,255,0.1); border-left: none; }
            .detail-icon-box { height: 120px; }
            .detail-icon-box .item-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="global-scanlines"></div>

    <div class="inventory-modal">
        
        <!-- Left Pane: The Grid -->
        <div class="grid-section">
            <div class="section-header">
                <span>STORAGE_MATRIX</span>
                <span class="capacity-tracker">VOL: <span id="item-count">0</span>/20</span>
            </div>
            
            <div class="inventory-grid" id="grid-container">
                <!-- Grid items generated by JS -->
            </div>
        </div>

        <!-- Right Pane: Item Details -->
        <div class="sidebar-section" id="sidebar-container">
            <!-- Default Empty State -->
            <div class="empty-sidebar">
                NO ITEM<br>SELECTED
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. Mock Database of Items ---
            // Simulating a backend or save file data structure
            const inventoryItems = [
                { id: 1, name: "Ion Blaster", rarity: "rare", desc: "Standard issue corporate security sidearm. Fires superheated ionized plasma bolts.", icon: "🔫", stats: { DMG: "45", ROF: "Med", ACC: "High" }, action: "EQUIP" },
                { id: 2, name: "Neuro-Stimpak", rarity: "common", desc: "A fast-acting synthetic adrenaline compound. Restores 50 HP instantly.", icon: "💉", stats: { HEAL: "+50 HP", TOX: "Low" }, action: "USE ITEM" },
                { id: 5, name: "Hyper-Core", rarity: "legendary", desc: "An unstable, extremely dense energy source recovered from a downed dreadnought.", icon: "🔮", stats: { PWR: "9999", STB: "Critical" }, action: "INSTALL" },
                { id: 6, name: "Data Shard", rarity: "common", desc: "Encrypted memory module containing sensitive megacorp blueprints.", icon: "💾", stats: { SIZE: "128 YB", ENC: "AES-512" }, action: "DECRYPT" },
                { id: 8, name: "EMP Grenade", rarity: "rare", desc: "Disables electronics and cyberware in a 10-meter radius for 5 seconds.", icon: "💣", stats: { RAD: "10m", DUR: "5s" }, action: "EQUIP" },
                { id: 13, name: "Thermal Katana", rarity: "legendary", desc: "A monomolecular blade heated to 3000°C. Slices through heavy armor like butter.", icon: "🗡️", stats: { DMG: "120", AP: "Max", SPD: "Fast" }, action: "EQUIP" },
                { id: 18, name: "Scrap Metal", rarity: "common", desc: "Useless junk salvaged from the lower levels. Might be worth a few credits.", icon: "⚙️", stats: { VAL: "5 CR" }, action: "DISCARD" }
            ];

            const gridContainer = document.getElementById('grid-container');
            const sidebarContainer = document.getElementById('sidebar-container');
            const itemCountDisplay = document.getElementById('item-count');
            
            const totalSlots = 20; // 5x4 grid
            let activeSlotIndex = null;

            // --- 2. Render Grid ---
            function renderGrid() {
                let itemsLoaded = 0;

                for (let i = 0; i < totalSlots; i++) {
                    // Check if an item exists at this specific "slot index"
                    const item = inventoryItems.find(item => item.id === (i + 1));
                    
                    const slotObj = document.createElement('div');
                    slotObj.classList.add('item-slot');
                    slotObj.dataset.index = i; // Save slot index for click events
                    
                    // Add ID Number (01, 02, etc)
                    const slotNumber = document.createElement('div');
                    slotNumber.classList.add('slot-id');
                    slotNumber.innerText = (i + 1).toString().padStart(2, '0');
                    slotObj.appendChild(slotNumber);

                    // If item exists, populate it
                    if (item) {
                        itemsLoaded++;
                        slotObj.classList.add(item.rarity);
                        slotObj.dataset.itemId = item.id; // Link to data

                        const iconObj = document.createElement('div');
                        iconObj.classList.add('item-icon');
                        iconObj.innerText = item.icon;
                        slotObj.appendChild(iconObj);
                    }

                    // Click Event Listener
                    slotObj.addEventListener('click', () => handleSlotClick(slotObj, item));
                    
                    gridContainer.appendChild(slotObj);
                }

                itemCountDisplay.innerText = itemsLoaded;
            }

            // --- 3. Handle Interactions ---
            function handleSlotClick(slotElement, itemData) {
                // Remove active class from all slots
                document.querySelectorAll('.item-slot').forEach(el => el.classList.remove('active'));
                
                // Add active class to clicked
                slotElement.classList.add('active');

                // Update Sidebar
                if (itemData) {
                    renderSidebar(itemData);
                } else {
                    renderEmptySidebar();
                }
            }

            // --- 4. Render Sidebar UI ---
            function renderSidebar(item) {
                // Determine Rarity Colors for inline styling
                let colorHex = 'var(--rarity-common)';
                if(item.rarity === 'rare') colorHex = 'var(--rarity-rare)';
                if(item.rarity === 'legendary') colorHex = 'var(--rarity-legendary)';

                let statsHtml = '';
                if(item.stats) {
                    for (const [key, value] of Object.entries(item.stats)) {
                        statsHtml += `<li>${key}: <span>${value}</span></li>`;
                    }
                }

                sidebarContainer.innerHTML = `
                    <div class="detail-icon-box" style="border-color: ${colorHex}; box-shadow: inset 0 0 50px ${colorHex}40;">
                        <div class="item-icon" style="filter: drop-shadow(0 0 15px ${colorHex});">${item.icon}</div>
                    </div>
                    
                    <h2 class="item-title glitch-text" data-text="${item.name}">${item.name}</h2>
                    
                    <div class="item-rarity-badge" style="color: ${colorHex}; border: 1px solid ${colorHex};">
                        ${item.rarity}
                    </div>
                    
                    <p class="item-desc">${item.desc}</p>
                    
                    <ul class="item-stats">
                        ${statsHtml}
                    </ul>
                    
                    <button class="use-btn">${item.action}</button>
                `;
            }

            function renderEmptySidebar() {
                sidebarContainer.innerHTML = `
                    <div class="empty-sidebar">
                        SLOT EMPTY<br>AWAITING DATA
                    </div>
                    <button class="use-btn" disabled>NO ACTION</button>
                `;
            }

            // Initialize System
            renderGrid();
        });
    </script>
</body>
</html>
