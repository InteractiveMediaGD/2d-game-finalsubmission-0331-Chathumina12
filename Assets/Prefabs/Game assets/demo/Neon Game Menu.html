<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NEON FURY - Main Menu</title>

    <!-- Importing sci-fi/cyberpunk appropriate fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

   

    <style>

        /* =========================================

           1. CSS VARIABLES (Theme Configuration)

           Easily customizable for potential buyers

           ========================================= */

        :root {

            /* Core Colors */

            --bg-color: #050505;

            --primary-color: #00f2ff; /* Neon Cyan */

            --secondary-color: #ff00ff; /* Neon Magenta */

            --text-color: #ffffff;

           

            /* Background Grid Colors */

            --grid-color: rgba(0, 242, 255, 0.15);

            --grid-glow: rgba(0, 242, 255, 0.4);


            /* Glow Intensities */

            --glow-spread-sm: 5px;

            --glow-spread-md: 15px;

            --glow-spread-lg: 30px;

           

            /* Animation Speeds */

            --transition-speed: 0.3s;

            --glitch-speed: 2s;

        }


        /* =========================================

           2. RESET & BASE SETUP

           ========================================= */

        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }


        body {

            background-color: var(--bg-color);

            color: var(--text-color);

            font-family: 'Rajdhani', sans-serif;

            height: 100vh;

            overflow: hidden; /* Prevent scrolling from grid/glows */

            display: flex;

            justify-content: center;

            align-items: center;

            flex-direction: column;

            position: relative;

        }


        /* =========================================

           3. BACKGROUND EFFECTS

           ========================================= */

        /* Animated 3D Cyber Grid */

        .cyber-grid {

            position: absolute;

            bottom: -50%;

            left: -50%;

            width: 200%;

            height: 200%;

            background-image:

                linear-gradient(var(--grid-color) 2px, transparent 2px),

                linear-gradient(90deg, var(--grid-color) 2px, transparent 2px);

            background-size: 50px 50px;

            transform: perspective(600px) rotateX(75deg) translateY(100px) translateZ(-200px);

            animation: gridMove 10s linear infinite;

            z-index: 1;

            /* Fade out the grid as it goes up */

            mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 60%);

            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 60%);

        }


        /* Ambient glowing orb in the background */

        .ambient-glow {

            position: absolute;

            top: 50%;

            left: 50%;

            transform: translate(-50%, -50%);

            width: 60vw;

            height: 60vh;

            background: radial-gradient(circle, var(--grid-glow) 0%, transparent 60%);

            opacity: 0.3;

            z-index: 1;

            pointer-events: none;

            filter: blur(50px);

        }


        /* CRT Scanline Overlay */

        .scanlines {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));

            background-size: 100% 4px;

            z-index: 100;

            pointer-events: none; /* Let clicks pass through to buttons */

        }


        /* HUD Corner Accents */

        .hud-corner {

            position: absolute;

            width: 150px;

            height: 150px;

            border: 2px solid var(--primary-color);

            opacity: 0.5;

            z-index: 10;

            pointer-events: none;

        }

        .hud-top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }

        .hud-bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }


        /* =========================================

           4. TYPOGRAPHY & TITLE

           ========================================= */

        .title-container {

            position: relative;

            z-index: 10;

            margin-bottom: 60px;

            text-align: center;

        }


        .glitch-title {

            font-family: 'Orbitron', sans-serif;

            font-size: clamp(3rem, 8vw, 6rem); /* Responsive sizing */

            font-weight: 900;

            text-transform: uppercase;

            letter-spacing: 0.5rem;

            color: var(--text-color);

            position: relative;

            text-shadow:

                0 0 var(--glow-spread-sm) var(--primary-color),

                0 0 var(--glow-spread-md) var(--primary-color);

        }


        /* Glitch effect pseudo-elements */

        .glitch-title::before,

        .glitch-title::after {

            content: attr(data-text);

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            opacity: 0.8;

        }


        .glitch-title::before {

            left: 3px;

            text-shadow: -2px 0 var(--secondary-color);

            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);

            animation: glitch-anim-1 var(--glitch-speed) infinite linear alternate-reverse;

        }


        .glitch-title::after {

            left: -3px;

            text-shadow: -2px 0 var(--primary-color);

            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);

            animation: glitch-anim-2 calc(var(--glitch-speed) * 0.8) infinite linear alternate-reverse;

        }


        /* =========================================

           5. MAIN MENU & BUTTONS

           ========================================= */

        .menu-container {

            display: flex;

            flex-direction: column;

            gap: 1.2rem;

            z-index: 10;

            width: 100%;

            max-width: 400px;

            padding: 0 20px;

        }


        .cyber-button {

            position: relative;

            display: flex;

            justify-content: space-between;

            align-items: center;

            background: rgba(0, 242, 255, 0.05);

            border: 1px solid var(--primary-color);

            color: var(--primary-color);

            font-family: 'Rajdhani', sans-serif;

            font-size: 1.5rem;

            font-weight: 700;

            letter-spacing: 0.2rem;

            text-transform: uppercase;

            padding: 15px 30px;

            cursor: pointer;

            outline: none;

            backdrop-filter: blur(10px);

            -webkit-backdrop-filter: blur(10px);

            transition: all var(--transition-speed) ease;

           

            /* Angular sci-fi corners using clip-path */

            clip-path: polygon(

                0 0,

                calc(100% - 15px) 0,

                100% 15px,

                100% 100%,

                15px 100%,

                0 calc(100% - 15px)

            );

           

            box-shadow:

                inset 0 0 10px rgba(0, 242, 255, 0.2),

                0 0 10px rgba(0, 242, 255, 0.2);

        }


        /* Decorative military/data tag inside the button */

        .btn-tag {

            font-size: 0.8rem;

            opacity: 0.6;

            font-weight: 500;

            letter-spacing: 1px;

        }


        /* Subtle glowing line behind the button for depth */

        .cyber-button::before {

            content: '';

            position: absolute;

            top: 0; left: 0; right: 0; bottom: 0;

            border: 2px solid transparent;

            background: linear-gradient(45deg, var(--primary-color), transparent) border-box;

            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);

            -webkit-mask-composite: destination-out;

            mask-composite: exclude;

            pointer-events: none;

        }


        /* --- HOVER STATES --- */

        .cyber-button:hover, .cyber-button:focus {

            background: rgba(255, 0, 255, 0.1);

            color: var(--text-color);

            border-color: var(--secondary-color);

            transform: scale(1.05) translateX(10px); /* Slight pop out and right shift */

           

            box-shadow:

                inset 0 0 20px rgba(255, 0, 255, 0.5),

                0 0 20px rgba(255, 0, 255, 0.6),

                0 0 40px rgba(255, 0, 255, 0.4);

           

            animation: flicker 0.15s ease-in-out infinite alternate;

        }


        /* Hover changes the decorative pseudo element */

        .cyber-button:hover::before {

            background: linear-gradient(45deg, var(--secondary-color), transparent) border-box;

        }


        .cyber-button:hover .btn-tag {

            color: var(--secondary-color);

            opacity: 1;

        }


        /* Active/Click state */

        .cyber-button:active {

            transform: scale(0.98) translateX(5px);

            filter: brightness(1.5);

        }


        /* =========================================

           6. ANIMATIONS

           ========================================= */

       

        /* Grid Perspective Movement */

        @keyframes gridMove {

            0% { transform: perspective(600px) rotateX(75deg) translateY(0) translateZ(-200px); }

            100% { transform: perspective(600px) rotateX(75deg) translateY(50px) translateZ(-200px); }

        }


        /* Button Hover Flicker Effect */

        @keyframes flicker {

            0% { opacity: 0.9; text-shadow: 0 0 5px var(--secondary-color); }

            50% { opacity: 1; text-shadow: 0 0 15px var(--secondary-color), 0 0 30px var(--secondary-color); }

            100% { opacity: 0.8; text-shadow: none; }

        }


        /* Title Glitch Animations */

        @keyframes glitch-anim-1 {

            0% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); transform: translate(-2px, 1px); }

            20% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); transform: translate(2px, -1px); }

            40% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); transform: translate(-2px, 2px); }

            60% { clip-path: polygon(0 15%, 100% 15%, 100% 25%, 0 25%); transform: translate(2px, -2px); }

            80% { clip-path: polygon(0 55%, 100% 55%, 100% 65%, 0 65%); transform: translate(-1px, 1px); }

            100% { clip-path: polygon(0 85%, 100% 85%, 100% 95%, 0 95%); transform: translate(1px, -1px); }

        }


        @keyframes glitch-anim-2 {

            0% { clip-path: polygon(0 25%, 100% 25%, 100% 35%, 0 35%); transform: translate(2px, -1px); }

            20% { clip-path: polygon(0 65%, 100% 65%, 100% 75%, 0 75%); transform: translate(-2px, 1px); }

            40% { clip-path: polygon(0 5%, 100% 5%, 100% 15%, 0 15%); transform: translate(2px, 2px); }

            60% { clip-path: polygon(0 45%, 100% 45%, 100% 55%, 0 55%); transform: translate(-2px, -2px); }

            80% { clip-path: polygon(0 75%, 100% 75%, 100% 85%, 0 85%); transform: translate(1px, 1px); }

            100% { clip-path: polygon(0 35%, 100% 35%, 100% 45%, 0 45%); transform: translate(-1px, -1px); }

        }

    </style>

</head>

<body>


    <!-- Background Elements -->

    <div class="ambient-glow"></div>

    <div class="cyber-grid"></div>

    <div class="scanlines"></div>

   

    <!-- HUD Accents -->

    <div class="hud-corner hud-top-left"></div>

    <div class="hud-corner hud-bottom-right"></div>


    <!-- Main Content -->

    <div class="title-container">

        <!-- data-text attribute is used for the CSS glitch effect -->

        <h1 class="glitch-title" data-text="NEON FURY">NEON FURY</h1>

    </div>


    <nav class="menu-container">

        <button class="cyber-button" tabindex="1">

            <span class="btn-text">START</span>

            <span class="btn-tag">SYS.01</span>

        </button>

        <button class="cyber-button" tabindex="2">

            <span class="btn-text">LOAD</span>

            <span class="btn-tag">SYS.02</span>

        </button>

        <button class="cyber-button" tabindex="3">

            <span class="btn-text">MULTIPLAYER</span>

            <span class="btn-tag">NET.03</span>

        </button>

        <button class="cyber-button" tabindex="4">

            <span class="btn-text">SETTINGS</span>

            <span class="btn-tag">CFG.04</span>

        </button>

        <button class="cyber-button" tabindex="5">

            <span class="btn-text">EXIT</span>

            <span class="btn-tag">EXT.05</span>

        </button>

    </nav>


    <!-- Optional JS: Just to handle arrow key navigation for a true "game menu" feel -->

    <script>

        document.addEventListener('DOMContentLoaded', () => {

            const buttons = document.querySelectorAll('.cyber-button');

            let currentIndex = 0;


            // Focus the first button on load

            if(buttons.length > 0) buttons[0].focus();


            // Add keyboard navigation (Up/Down arrows)

            document.addEventListener('keydown', (e) => {

                if (e.key === 'ArrowDown') {

                    currentIndex = (currentIndex + 1) % buttons.length;

                    buttons[currentIndex].focus();

                    e.preventDefault();

                } else if (e.key === 'ArrowUp') {

                    currentIndex = (currentIndex - 1 + buttons.length) % buttons.length;

                    buttons[currentIndex].focus();

                    e.preventDefault();

                }

            });


            // Update current index if user uses mouse to hover/click

            buttons.forEach((btn, index) => {

                btn.addEventListener('mouseenter', () => {

                    currentIndex = index;

                    btn.focus();

                });

            });

        });

    </script>

</body>

</html>
